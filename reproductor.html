<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Listening Practice</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="card-container player-container">
  <button class="back-link" onclick="volverAIndicaciones()">← Volver a indicaciones</button>
  
  <div id="lessonView">
    <div class="lesson-counter" id="lessonCounter">Lección 1 / 3</div>

    <div class="video-wrap">
      <video id="player" controls playsinline loop></video>
    </div>

    <!-- Contenedor del área de respuesta (ahora DIV editable) -->
    <div class="input-area-wrapper">
      <div
        id="answerInput"
        class="answer-input"
        contenteditable="true"
        role="textbox"
      ></div>

    </div>

    <div class="feedback" id="feedback"></div>

    <div class="check-btn-wrap">
      <button id="checkBtn" class="check-btn" aria-label="Comprobar respuesta">✓</button>
      <button id="nextBtn" class="next-btn hidden">Pasar a la siguiente lección</button>
      <button id="hintBtn" class="hint-btn">Pedir pista (2 letras)</button>
    </div>

    <button id="skipBtn" class="skip-link">Quiero omitir esta sesión</button>
  </div>

  <div id="finalScreen" class="final-screen">
    <div class="emoji">🎉</div>
    <h2>Well done!</h2> 
    <p>You've completed all the listening exercises.</p>
  </div>
</div>

<script>
  function volverAIndicaciones() {
    const parametros = new URLSearchParams(window.location.search);
    const nivel = parametros.get('nivel') || 'A';
    window.location.href = `indicaciones.html?nivel=${nivel}`;
  }
</script>
<script src="script.js"></script>
</body>
</html>
